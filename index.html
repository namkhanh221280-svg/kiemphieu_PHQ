<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Kiểm Phiếu Bầu Cử HĐND</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.37.2/docxtemplater.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pizzip/3.1.4/pizzip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .main-container { max-width: 900px; margin: 30px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; font-weight: bold; text-align: center; margin-bottom: 30px; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .candidate-item { font-size: 1.2rem; padding: 10px; border-radius: 8px; transition: 0.3s; margin-bottom: 5px; cursor: pointer; }
        .candidate-item:hover { background-color: #fff5f5; }
        .form-check-input { width: 1.5em; height: 1.5em; cursor: pointer; border-color: #c0392b; }
        .form-check-label { cursor: pointer; padding-left: 10px; }
        .stat-box { text-align: center; padding: 15px; border-radius: 10px; color: white; font-weight: bold; }
        .bg-invalid { background-color: #e74c3c; }
        .bg-valid { background-color: #27ae60; }
        .bg-total { background-color: #34495e; }
        .btn-confirm { height: 60px; font-size: 1.3rem; font-weight: bold; background-color: #27ae60; border: none; }
        .btn-confirm:hover { background-color: #219150; }
        .winner-row { background-color: #e8f6f3 !important; }
        .template-loader { background: #f0f2f5; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px dashed #3498db; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-container">
        <h1>HỆ THỐNG KIỂM PHIẾU BẦU CỬ</h1>

        <div class="template-loader">
            <h6 class="fw-bold mb-2 text-primary">BƯỚC 1: NẠP FILE MẪU TỪ MÁY TÍNH</h6>
            <div class="row g-2">
                <div class="col-md-6">
                    <label class="small fw-bold">Chọn Mẫu 23.docx:</label>
                    <input type="file" class="form-control form-control-sm" accept=".docx" onchange="loadTemplate(event, 'mau23')">
                </div>
                <div class="col-md-6">
                    <label class="small fw-bold">Chọn Mẫu 24.docx:</label>
                    <input type="file" class="form-control form-control-sm" accept=".docx" onchange="loadTemplate(event, 'mau24')">
                </div>
            </div>
            <div id="statusMsg" class="small mt-2 text-muted"></div>
        </div>

        <div class="card mb-4">
            <div class="card-header bg-primary text-white">Thông tin cử tri</div>
            <div class="card-body">
                <div class="row align-items-center">
                    <div class="col-auto">
                        <label class="form-label mb-0">Tổng số cử tri:</label>
                    </div>
                    <div class="col-md-3">
                        <input type="number" id="votersInput" class="form-control" value="100">
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-4 border-danger">
            <div class="card-header bg-danger text-white">Nhập phiếu (Tích chọn người BỊ GẠCH)</div>
            <div class="card-body">
                <div id="candidateList" class="d-flex flex-column align-items-center"></div>
            </div>
        </div>

        <button id="btnConfirm" class="btn btn-confirm w-100 mb-4 text-white shadow">XÁC NHẬN PHIẾU (ENTER)</button>

        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="stat-box bg-total shadow-sm">Tổng thu: <span id="totalBallots">0</span></div>
            </div>
            <div class="col-md-4">
                <div class="stat-box bg-valid shadow-sm">Hợp lệ: <span id="validBallots">0</span></div>
            </div>
            <div class="col-md-4">
                <div class="stat-box bg-invalid shadow-sm">KHÔNG HỢP LỆ: <span id="invalidBallots">0</span></div>
            </div>
        </div>

        <div class="d-flex justify-content-between gap-2">
            <button class="btn btn-warning fw-bold flex-grow-1" onclick="showSummary()">XEM KẾT QUẢ TỔNG HỢP</button>
            <button class="btn btn-success fw-bold flex-grow-1" onclick="exportReports()">XUẤT MẪU 23 & 24</button>
            <button class="btn btn-outline-secondary fw-bold" onclick="resetData()">LÀM MỚI DỮ LIỆU</button>
        </div>
    </div>
</div>

<div class="modal fade" id="summaryModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold">BẢNG TỔNG HỢP KẾT QUẢ CHI TIẾT</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p id="summarySubTitle" class="fst-italic text-center"></p>
                <table class="table table-bordered table-hover">
                    <thead class="table-dark text-center">
                        <tr>
                            <th>Thứ tự</th>
                            <th>Ứng cử viên</th>
                            <th>Số phiếu đạt được</th>
                            <th>Tỷ lệ (%)</th>
                        </tr>
                    </thead>
                    <tbody id="summaryTableBody"></tbody>
                </table>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const CONFIG = {
        candidates: ["Trung Hải", "Tâm Hiền", "Văn Hùng", "Hồng Linh", "Đức Tuấn", "Thế Uyên"],
        maxToElect: 5
    };

    let data = { totalBallots: 0, validBallots: 0, invalidBallots: 0, votes: new Array(CONFIG.candidates.length).fill(0) };
    let loadedTemplates = { mau23: null, mau24: null };

    function loadTemplate(event, type) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            loadedTemplates[type] = e.target.result;
            document.getElementById('statusMsg').innerHTML = `<span class="text-success">✅ Đã nạp ${file.name}. Sẵn sàng xuất biên bản!</span>`;
        };
        reader.readAsArrayBuffer(file);
    }

    function renderCandidates() {
        const container = document.getElementById('candidateList');
        container.innerHTML = CONFIG.candidates.map((name, index) => `
            <div class="form-check candidate-item w-50">
                <input class="form-check-input" type="checkbox" id="chk_${index}" value="${index}">
                <label class="form-check-label fw-semibold" for="chk_${index}">${index + 1}. ${name}</label>
            </div>
        `).join('');
    }

    function processVote() {
        const checkboxes = document.querySelectorAll('.form-check-input');
        let gachCount = 0; let selectedIndexes = [];
        checkboxes.forEach((chk, idx) => {
            if (chk.checked) gachCount++;
            else selectedIndexes.push(idx);
        });
        const conLai = CONFIG.candidates.length - gachCount;
        data.totalBallots++;
        if (conLai === 0 || conLai > CONFIG.maxToElect) data.invalidBallots++;
        else {
            data.validBallots++;
            selectedIndexes.forEach(idx => data.votes[idx]++);
        }
        updateUI();
        checkboxes.forEach(chk => chk.checked = false);
    }

    function updateUI() {
        document.getElementById('totalBallots').innerText = data.totalBallots;
        document.getElementById('validBallots').innerText = data.validBallots;
        document.getElementById('invalidBallots').innerText = data.invalidBallots;
    }

    function showSummary() {
        if (data.validBallots === 0) return alert("Chưa có dữ liệu!");
        const tbody = document.getElementById('summaryTableBody');
        let summaryData = CONFIG.candidates.map((name, i) => {
            const v = data.votes[i];
            const percent = (v / data.validBallots) * 100;
            return { name, v, percent };
        }).sort((a, b) => b.v - a.v);

        tbody.innerHTML = summaryData.map((item, idx) => `
            <tr class="${idx < CONFIG.maxToElect ? 'winner-row' : ''}">
                <td class="text-center">${idx + 1}</td>
                <td>${item.name}</td>
                <td class="text-center">${item.v} / ${data.validBallots}</td>
                <td class="text-center fw-bold">${item.percent.toFixed(2)} %</td>
            </tr>
        `).join('');
        new bootstrap.Modal(document.getElementById('summaryModal')).show();
    }

    async function exportReports() {
    if (!loadedTemplates.mau23 || !loadedTemplates.mau24) {
        alert("⚠️ Anh chưa nạp file mẫu! Hãy chọn tệp ở Bước 1.");
        return;
    }

    // LẤY DỮ LIỆU TRỰC TIẾP TỪ BẢNG TỔNG HỢP (Mục tiêu của anh)
    let summaryData = CONFIG.candidates.map((name, i) => {
        const v = data.votes[i];
        const percent = data.validBallots > 0 ? ((v / data.validBallots) * 100).toFixed(2) : "0.00";
        return { name, v, percent, originalIndex: i };
    });

    // Tạo context để điền vào file
    const now = new Date();
    const context = {
        tong_phieu_thu: data.totalBallots,
        phiieu_hop_le: data.validBallots, // Khớp với tag {{phiieu_hop_le}} trong file của anh
        phiieu_khong_hop_le: data.invalidBallots,
        ngay: now.getDate(),
        thang: now.getMonth() + 1,
        nam: 2026
    };

    // 1. Điền danh sách toàn bộ ứng cử viên (Dùng cho Mẫu 23 và phần đầu Mẫu 24)
    summaryData.forEach((item, i) => {
        context[`ten_${i + 1}`] = item.name;
        context[`v_${i + 1}`] = item.v;
        context[`p_${i + 1}`] = item.percent;
    });

    // 2. Điền danh sách người trúng cử (Dùng cho Mẫu 24 - Lấy theo thứ tự từ cao xuống thấp)
    let winners = [...summaryData].sort((a, b) => b.v - a.v);
    for (let i = 0; i < CONFIG.maxToElect; i++) {
        if (winners[i]) {
            context[`trung_ten_${i + 1}`] = winners[i].name;
            context[`trung_v_${i + 1}`] = winners[i].v;
            context[`trung_p_${i + 1}`] = winners[i].percent;
        }
    }

    // Tiến hành in file
    try {
        renderAndSave(loadedTemplates.mau23, context, "Ket_Qua_Mau_23.docx");
        renderAndSave(loadedTemplates.mau24, context, "Ket_Qua_Mau_24.docx");
        alert("✅ Đã lấy dữ liệu từ bảng tổng hợp và xuất file thành công!");
    } catch (error) {
        console.error(error);
        alert("Lỗi render. Anh hãy kiểm tra lại các tag {{ }} trong file Word.");
    }
}

    function saveWord(content, data, filename) {
        try {
            const zip = new PizZip(content);
            const doc = new window.docxtemplater(zip, { 
                paragraphLoop: true, 
                linebreaks: true,
                // Thêm trình xử lý lỗi để bỏ qua các tag bị hỏng
                parser: function(tag) {
                    return {
                        get: function(scope) {
                            return scope[tag] !== undefined ? scope[tag] : "";
                        }
                    };
                }
            });
            doc.render(data);
            const out = doc.getZip().generate({ 
                type: "blob", 
                mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" 
            });
            saveAs(out, filename);
        } catch (error) {
            console.error("Chi tiết lỗi:", error);
            alert("Vẫn còn lỗi ở tag: " + (error.properties?.errors?.[0]?.message || "Không xác định"));
        }
    }

    function resetData() { if(confirm("Xóa toàn bộ dữ liệu?")) location.reload(); }
    document.getElementById('btnConfirm').addEventListener('click', processVote);
    window.addEventListener('keydown', (e) => { if (e.key === 'Enter') processVote(); });
    renderCandidates();
</script>
</body>
</html>
